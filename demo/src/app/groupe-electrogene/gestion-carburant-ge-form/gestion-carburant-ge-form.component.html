<div class="modal-overlay" (click)="cancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Saisie carburant — {{ groupe?.site }}</h3>
      <button class="btn-close" (click)="cancel()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Année</label>
          <select class="form-input" [(ngModel)]="form.annee">
            <option *ngFor="let a of anneeOptions" [value]="a">{{ a }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Semestre</label>
          <select class="form-input" [(ngModel)]="form.semestre">
  <option *ngFor="let s of semestreOptions" [value]="s">{{ getSemestreLabel(s) }}</option>
</select>
        </div>
      </div>
      <div class="form-section">
        <h4 class="section-title">Données du semestre</h4>
        <div class="form-row">
          <div class="form-group"><label>Index heure début semestre</label><input class="form-input" type="number" step="0.1" [(ngModel)]="form.indexHeureSemestrePrecedent"/></div>
          <div class="form-group"><label>Montant restant réservoir (préc.)</label><input class="form-input" type="number" step="0.001" [(ngModel)]="form.montantCarburantRestantReservoirPrecedent"/></div>
          <div class="form-group"><label>Ravitaillement sem. préc. (DT)</label><input class="form-input" type="number" step="0.001" [(ngModel)]="form.ravitaillementSemestrePrecedentDinars"/></div>
          <div class="form-group"><label>Montant restant Agilis fin sem.</label><input class="form-input" type="number" step="0.001" [(ngModel)]="form.montantRestantAgilisFinSemestre"/></div>
          <div class="form-group"><label>Index fin semestre</label><input class="form-input" type="number" step="0.1" [(ngModel)]="form.indexFinSemestre"/></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="cancel()">Annuler</button>
      <button class="btn btn-primary" (click)="submit()" [disabled]="submitting">{{ submitting ? 'Envoi...' : 'Enregistrer' }}</button>
    </div>
  </div>
</div>
