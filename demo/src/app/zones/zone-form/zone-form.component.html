<div class="modal-overlay" (click)="cancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ isEditMode ? 'Modifier la zone' : 'Nouvelle zone' }}</h3>
      <button class="btn-close" (click)="cancel()">✕</button>
    </div>

    <form [formGroup]="zoneForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="nom">Nom de la zone *</label>
        <input
          id="nom"
          type="text"
          formControlName="nom"
          placeholder="Ex: COMMERCIAL, CSC BARDO..."
          [class.error]="zoneForm.get('nom')?.invalid && zoneForm.get('nom')?.touched"
        />
        <small class="error-message" *ngIf="zoneForm.get('nom')?.hasError('required') && zoneForm.get('nom')?.touched">
          Le nom est obligatoire
        </small>
        <small class="error-message" *ngIf="zoneForm.get('nom')?.hasError('minlength')">
          Le nom doit contenir au moins 2 caractères
        </small>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea
          id="description"
          formControlName="description"
          rows="4"
          placeholder="Description de la zone..."
        ></textarea>
      </div>

      <div class="form-group">
        <label for="responsable">Responsable</label>
        <input
          id="responsable"
          type="text"
          formControlName="responsable"
          placeholder="Nom du responsable de la zone"
        />
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="submitting">
          Annuler
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="zoneForm.invalid || submitting">
          {{ submitting ? 'Enregistrement...' : (isEditMode ? 'Modifier' : 'Créer') }}
        </button>
      </div>
    </form>
  </div>
</div>
