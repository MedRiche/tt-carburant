<nav class="navbar" *ngIf="currentUser">
  <div class="navbar-container">
    <!-- Logo -->
    <div class="navbar-brand">
      <span class="logo">🚗 TT Carburant</span>
    </div>

    <!-- Menu de navigation -->
    <div class="navbar-menu">
      <!-- Menu Admin -->
      <div *ngIf="isAdmin" class="nav-links">
        <a (click)="navigateTo('/admin/utilisateurs')" class="nav-link">
          👥 Utilisateurs
        </a>
        <a (click)="navigateTo('/admin/zones')" class="nav-link">
          🗺️ Zones
        </a>
      </div>

      <!-- Menu Technicien -->
      <div *ngIf="isTechnicien" class="nav-links">
        <a (click)="navigateTo('/technicien/dashboard')" class="nav-link">
          📊 Dashboard
        </a>
      </div>

      <!-- Informations utilisateur -->
      <div class="user-info">
        <div class="user-details">
          <span class="user-name">{{ currentUser.nom }}</span>
          <span class="user-role" [class.admin]="isAdmin" [class.technicien]="isTechnicien">
            {{ currentUser.role }}
          </span>
        </div>
        <button class="btn-logout" (click)="logout()">
          🚪 Déconnexion
        </button>
      </div>
    </div>
  </div>
</nav>
