<!-- src/app/vehicules/vehicule-form/vehicule-form.component.html -->
<div class="modal-backdrop" (click)="cancel()">
  <div class="modal" (click)="$event.stopPropagation()">

    <div class="modal-head">
      <div class="modal-head-icon">🚗</div>
      <div>
        <h3 class="modal-title">{{ isEditMode ? 'Modifier le véhicule' : 'Nouveau véhicule' }}</h3>
        <p class="modal-sub">{{ isEditMode ? vehicule?.matricule : 'Renseignez les informations du véhicule' }}</p>
      </div>
      <button class="modal-close" (click)="cancel()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="modal-body">

      <!-- Section 1 : Identification -->
      <div class="section-title">
        <span class="section-dot"></span>
        Identification
      </div>
      <div class="form-grid">

        <div class="field-group">
          <label class="field-label">Matricule <span class="req">*</span></label>
          <input class="field-input" [class.error]="form.get('matricule')?.invalid && form.get('matricule')?.touched"
                 formControlName="matricule" placeholder="Ex: 17-TN-1234"/>
          <span class="field-error" *ngIf="form.get('matricule')?.invalid && form.get('matricule')?.touched">
            {{ getError('matricule') }}
          </span>
        </div>

        <div class="field-group">
          <label class="field-label">Marque / Modèle <span class="req">*</span></label>
          <input class="field-input" [class.error]="form.get('marqueModele')?.invalid && form.get('marqueModele')?.touched"
                 formControlName="marqueModele" placeholder="Ex: Peugeot Partner"/>
          <span class="field-error" *ngIf="form.get('marqueModele')?.invalid && form.get('marqueModele')?.touched">
            {{ getError('marqueModele') }}
          </span>
        </div>

        <div class="field-group">
          <label class="field-label">Type de véhicule <span class="req">*</span></label>
          <select class="field-input" formControlName="typeVehicule">
            <option value="">— Sélectionner —</option>
            <option *ngFor="let t of typesVehicule" [value]="t">{{ t }}</option>
          </select>
        </div>

        <div class="field-group">
          <label class="field-label">Date de mise en service</label>
          <input class="field-input" type="date" formControlName="dateMiseService"/>
        </div>

      </div>

      <!-- Section 2 : Affectation -->
      <div class="section-title">
        <span class="section-dot"></span>
        Affectation
      </div>
      <div class="form-grid">

        <div class="field-group">
          <label class="field-label">Zone</label>
          <select class="field-input" formControlName="zoneId">
            <option [value]="null">— Aucune zone —</option>
            <option *ngFor="let z of zones" [value]="z.id">{{ z.nom }}</option>
          </select>
        </div>

        <div class="field-group">
          <label class="field-label">Centre / Subdivision</label>
          <input class="field-input" formControlName="centre" placeholder="Central / CSC / ROC / Unité"/>
        </div>

        <div class="field-group">
          <label class="field-label">Subdivision</label>
          <input class="field-input" formControlName="subdivision" placeholder="Ex: DAF"/>
        </div>

        <div class="field-group">
          <label class="field-label">Résidence de service</label>
          <input class="field-input" formControlName="residenceService" placeholder="Ex: Tunis"/>
        </div>

      </div>

      <!-- Section 3 : Conducteur -->
      <div class="section-title">
        <span class="section-dot"></span>
        Conducteur
      </div>
      <div class="form-grid">

        <div class="field-group">
          <label class="field-label">Prénom</label>
          <input class="field-input" formControlName="prenomConducteur" placeholder="Prénom"/>
        </div>

        <div class="field-group">
          <label class="field-label">Nom</label>
          <input class="field-input" formControlName="nomConducteur" placeholder="Nom de famille"/>
        </div>

      </div>

      <!-- Section 4 : Carburant -->
      <div class="section-title">
        <span class="section-dot"></span>
        Carburant
      </div>
      <div class="form-grid">

        <div class="field-group">
          <label class="field-label">Type de carburant <span class="req">*</span></label>
          <select class="field-input" formControlName="typeCarburant">
            <option value="">— Sélectionner —</option>
            <option *ngFor="let tc of typeCarburantOptions" [value]="tc">{{ labelCarburant[tc] }}</option>
          </select>
        </div>

        <div class="field-group">
          <label class="field-label">Prix carburant (DT/L) <span class="req">*</span></label>
          <input class="field-input" type="number" step="0.001" formControlName="prixCarburant" placeholder="Ex: 2.180"/>
        </div>

        <div class="field-group">
          <label class="field-label">Coût du mois (budget DT)</label>
          <input class="field-input" type="number" step="0.001" formControlName="coutDuMois" placeholder="0.000"/>
        </div>

      </div>

      <!-- Section 5 : Index & Technique -->
      <div class="section-title">
        <span class="section-dot"></span>
        Index &amp; Technique
      </div>
      <div class="form-grid">

        <div class="field-group">
          <label class="field-label">Index vidange (km)</label>
          <input class="field-input" type="number" formControlName="indexVidange" placeholder="0"/>
        </div>

        <div class="field-group">
          <label class="field-label">Index pneumatique (km)</label>
          <input class="field-input" type="number" formControlName="indexPneumatique" placeholder="0"/>
        </div>

        <div class="field-group">
          <label class="field-label">Index batterie</label>
          <input class="field-input" type="number" formControlName="indexBatterie" placeholder="0"/>
        </div>

        <div class="field-group">
          <label class="field-label">Crox chaîne</label>
          <input class="field-input" type="number" formControlName="croxChaine" placeholder="0"/>
        </div>

        <div class="field-group">
          <label class="field-label">Visite technique</label>
          <input class="field-input" type="date" formControlName="visiteTechnique"/>
        </div>

        <div class="field-group">
          <label class="field-label">Kilométrage total (km)</label>
          <input class="field-input" type="number" formControlName="kilometrageTotal" placeholder="0"/>
        </div>

      </div>

      <!-- Footer -->
      <div class="modal-foot">
        <button type="button" class="btn-cancel" (click)="cancel()" [disabled]="submitting">Annuler</button>
        <button type="submit" class="btn-confirm" [disabled]="form.invalid || submitting">
          <svg *ngIf="!submitting" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span *ngIf="submitting" class="spinner"></span>
          {{ submitting ? 'Enregistrement…' : (isEditMode ? 'Modifier' : 'Créer') }}
        </button>
      </div>

    </form>
  </div>
</div>
