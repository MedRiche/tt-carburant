<!-- src/app/vehicules/vehicule-form/vehicule-form.component.html -->
<div class="modal-overlay" (click)="cancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="modal-header">
      <h3>{{ isEditMode ? 'Modifier le véhicule' : 'Nouveau véhicule' }}</h3>
      <button class="btn-close" type="button" (click)="cancel()">✕</button>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <!-- Identification -->
      <div class="form-group">
        <label>Matricule <span style="color:#ef4444">*</span></label>
        <input [class.error]="form.get('matricule')?.invalid && form.get('matricule')?.touched"
               formControlName="matricule" placeholder="Ex: 17-TN-1234"/>
        <span class="error-message" *ngIf="form.get('matricule')?.invalid && form.get('matricule')?.touched">
          {{ getError('matricule') }}
        </span>
      </div>

      <div class="form-group">
        <label>Marque / Modèle <span style="color:#ef4444">*</span></label>
        <input [class.error]="form.get('marqueModele')?.invalid && form.get('marqueModele')?.touched"
               formControlName="marqueModele" placeholder="Ex: Peugeot Partner"/>
        <span class="error-message" *ngIf="form.get('marqueModele')?.invalid && form.get('marqueModele')?.touched">
          {{ getError('marqueModele') }}
        </span>
      </div>

      <div class="form-group">
        <label>Type de véhicule <span style="color:#ef4444">*</span></label>
        <select formControlName="typeVehicule">
          <option value="">— Sélectionner —</option>
          <option *ngFor="let t of typesVehicule" [value]="t">{{ t }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>Date de mise en service</label>
        <input type="date" formControlName="dateMiseService"/>
      </div>

      <!-- Affectation -->
      <div class="form-group">
        <label>Zone</label>
        <select formControlName="zoneId">
          <option [value]="null">— Aucune zone —</option>
          <option *ngFor="let z of zones" [value]="z.id">{{ z.nom }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>Centre / Subdivision</label>
        <input formControlName="centre" placeholder="Central / CSC / ROC / Unité"/>
      </div>

      <div class="form-group">
        <label>Subdivision</label>
        <input formControlName="subdivision" placeholder="Ex: DAF"/>
      </div>

      <div class="form-group">
        <label>Résidence de service</label>
        <input formControlName="residenceService" placeholder="Ex: Tunis"/>
      </div>

      <!-- Conducteur -->
      <div class="form-group">
        <label>Prénom conducteur</label>
        <input formControlName="prenomConducteur" placeholder="Prénom"/>
      </div>

      <div class="form-group">
        <label>Nom conducteur</label>
        <input formControlName="nomConducteur" placeholder="Nom de famille"/>
      </div>

      <!-- Carburant -->
      <div class="form-group">
        <label>Type de carburant <span style="color:#ef4444">*</span></label>
        <select formControlName="typeCarburant">
          <option value="">— Sélectionner —</option>
          <option *ngFor="let tc of typeCarburantOptions" [value]="tc">{{ labelCarburant[tc] }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>Prix carburant (DT/L) <span style="color:#ef4444">*</span></label>
        <input type="number" step="0.001" formControlName="prixCarburant" placeholder="Ex: 2.180"/>
      </div>

      <div class="form-group">
        <label>Coût du mois (DT)</label>
        <input type="number" step="0.001" formControlName="coutDuMois" placeholder="0.000"/>
      </div>

      <!-- Index & Technique -->
      <div class="form-group">
        <label>Index vidange (km)</label>
        <input type="number" formControlName="indexVidange" placeholder="0"/>
      </div>

      <div class="form-group">
        <label>Index pneumatique (km)</label>
        <input type="number" formControlName="indexPneumatique" placeholder="0"/>
      </div>

      <div class="form-group">
        <label>Index batterie</label>
        <input type="number" formControlName="indexBatterie" placeholder="0"/>
      </div>

      <div class="form-group">
        <label>Crox chaîne</label>
        <input type="number" formControlName="croxChaine" placeholder="0"/>
      </div>

      <div class="form-group">
        <label>Visite technique</label>
        <input type="date" formControlName="visiteTechnique"/>
      </div>

      <div class="form-group">
        <label>Kilométrage total (km)</label>
        <input type="number" formControlName="kilometrageTotal" placeholder="0"/>
      </div>

      <!-- Footer -->
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="cancel()" [disabled]="submitting">
          Annuler
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="form.invalid || submitting">
          {{ submitting ? 'Enregistrement…' : (isEditMode ? 'Modifier' : 'Créer') }}
        </button>
      </div>

    </form>
  </div>
</div>
