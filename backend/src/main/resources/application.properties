spring.application.name=ttcarburant

# ===============================
# DATABASE
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/plateforme_tt?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=MySQL2026!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SERVER
# ===============================
server.port=8081

# ===============================
# JWT
# ===============================
jwt.secret=MySecretKeyMySecretKeyMySecretKeyMySecretKey
jwt.expiration=86400000

# ===============================
# MULTIPART (import Excel)
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# FIX CRITIQUE ? SANS CES 2 LIGNES, SPRING RENVOIE
# "No static resource api/admin/groupes-electrogenes" (HTTP 500)
# au lieu de router vers votre @RestController.
# ===============================
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# ===============================
# Afficher les dÈtails d'erreur (dev only)
# ===============================
server.error.include-message=always
server.error.include-binding-errors=always